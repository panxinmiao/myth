<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myth Engine — Showcase</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #050507;
            --glass-bg: rgba(16, 16, 22, 0.55);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text: #e8e8ee;
            --text-muted: #8b8fa3;
            --accent: #7aa2f7;
            --accent-glow: rgba(122, 162, 247, 0.25);
            --radius: 16px;
            --transition: 0.35s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        html, body {
            width: 100%; height: 100%;
            overflow: hidden;
            background: var(--bg);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            color: var(--text);
            -webkit-font-smoothing: antialiased;
        }

        /* ── Canvas ─────────────────────────────────────────── */
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            outline: none;
        }

        /* ── Loading Overlay ────────────────────────────────── */
        #loading-overlay {
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 28px;
            transition: opacity 1s ease, visibility 1s ease;
        }

        #loading-overlay.fade-out {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-ring {
            width: 48px; height: 48px;
            border: 2px solid rgba(255,255,255,0.06);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.9s linear infinite;
        }

        .loader-label {
            font-size: 0.8rem;
            font-weight: 500;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--text-muted);
            animation: pulse 2s ease-in-out infinite;
        }

        .loader-brand {
            position: absolute;
            bottom: 40px;
            font-size: 0.7rem;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.15);
            text-transform: uppercase;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }

        /* ── Top Bar ────────────────────────────────────────── */
        .top-bar {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 28px;
            pointer-events: none;
            opacity: 0;
            transform: translateY(-8px);
            transition: opacity 0.6s ease 0.3s, transform 0.6s ease 0.3s;
        }

        .top-bar.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .brand {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text);
        }

        .brand-icon {
            width: 28px; height: 28px;
            background: linear-gradient(135deg, var(--accent), #bb9af7);
            border-radius: 7px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            color: #000;
        }

        .brand-text {
            font-size: 0.85rem;
            font-weight: 600;
            letter-spacing: 0.5px;
        }

        .github-link {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 6px;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: 400;
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            transition: color var(--transition), border-color var(--transition);
        }

        .github-link:hover {
            color: var(--text);
            border-color: rgba(255,255,255,0.2);
        }

        .github-link svg {
            width: 16px; height: 16px;
            fill: currentColor;
        }

        /* ── Bottom Controls ────────────────────────────────── */
        .controls {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            display: flex;
            gap: 4px;
            padding: 5px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            opacity: 0;
            transform: translateX(-50%) translateY(12px);
            transition: opacity 0.6s ease 0.5s, transform 0.6s ease 0.5s;
        }

        .controls.visible {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .preset-btn {
            position: relative;
            appearance: none;
            border: none;
            background: transparent;
            color: var(--text-muted);
            font-family: inherit;
            font-size: 0.82rem;
            font-weight: 500;
            padding: 10px 26px;
            border-radius: 22px;
            cursor: pointer;
            transition: color var(--transition), background var(--transition),
                        box-shadow var(--transition);
            white-space: nowrap;
            user-select: none;
        }

        .preset-btn:hover {
            color: var(--text);
            background: rgba(255,255,255,0.04);
        }

        .preset-btn.active {
            color: #fff;
            background: rgba(255,255,255,0.12);
            box-shadow: 0 2px 12px var(--accent-glow);
        }

        /* ── Hint ───────────────────────────────────────────── */
        .hint {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 40;
            font-size: 0.7rem;
            color: rgba(255,255,255,0.2);
            letter-spacing: 1px;
            opacity: 0;
            transition: opacity 3s ease 2s;
            pointer-events: none;
        }

        .hint.visible { opacity: 1; }

        /* ── Responsive ─────────────────────────────────────── */
        @media (max-width: 600px) {
            .top-bar { padding: 14px 16px; }
            .brand-text { display: none; }
            .preset-btn { padding: 8px 16px; font-size: 0.75rem; }
            .controls { bottom: 20px; }
            .hint { bottom: 72px; }
        }

        /* ── Top Actions ────────────────────────────────────── */
        .top-actions {
            pointer-events: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .icon-btn {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: var(--text-muted);
            width: 32px; height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: color var(--transition), border-color var(--transition);
        }

        .icon-btn:hover {
            color: var(--text);
            border-color: rgba(255,255,255,0.2);
        }

        /* ── Credits Modal ──────────────────────────────────── */
        .credits-modal {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .credits-modal.active {
            opacity: 1;
            visibility: visible;
        }

        .credits-content {
            position: relative;
            background: rgba(16, 16, 22, 0.85);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 32px 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.1);
            transform: translateY(20px) scale(0.95);
            transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
        }

        .credits-modal.active .credits-content {
            transform: translateY(0) scale(1);
        }

        .credits-content h3 {
            margin-bottom: 24px;
            font-size: 1.1rem;
            font-weight: 600;
            color: #fff;
            letter-spacing: 0.5px;
        }

        .credit-item {
            margin-bottom: 18px;
        }
        
        .credit-item:last-child { margin-bottom: 0; }

        .credit-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 600;
        }

        .credit-val {
            font-size: 0.9rem;
            color: var(--text);
            line-height: 1.5;
        }

        .credit-val a {
            color: var(--accent);
            text-decoration: none;
            transition: text-shadow 0.2s;
        }

        .credit-val a:hover {
            text-shadow: 0 0 8px var(--accent-glow);
            text-decoration: underline;
        }

        .close-btn {
            position: absolute;
            top: 20px; right: 20px;
            background: transparent;
            border: none;
            color: var(--text-muted);
            font-size: 1.5rem;
            cursor: pointer;
            transition: color 0.2s;
            line-height: 1;
        }

        .close-btn:hover { color: #fff; }
    </style>
</head>
<body>
    <!-- Loading Overlay -->
    <div id="loading-overlay">
        <div class="loader-ring"></div>
        <div class="loader-label">Preparing Scene</div>
        <div class="loader-brand">Myth Engine</div>
    </div>

    <!-- WebGPU Canvas -->
    <canvas id="myth-canvas"></canvas>

    <!-- Top Bar -->
    <div class="top-bar" id="top-bar">
        <a class="brand" href="#">
            <div class="brand-icon">M</div>
            <span class="brand-text">Myth Engine</span>
        </a>

        <div class="top-actions">

                GitHub
            </a>
        </div>

            <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.01 8.01 0 0 0 16 8c0-4.42-3.58-8-8-8z"/></svg>
            GitHub
        </a> -->
    </div>

    <div class="credits-modal" id="credits-modal">
        <div class="credits-content">
            <button class="close-btn" id="close-credits">&times;</button>
            <h3>Scene Info & Credits</h3>
            
            <div class="credit-item">
                <div class="credit-label">3D Model</div>
                <div class="credit-val">
                    <a href="https://sketchfab.com/3d-models/cutegirl-g1-4420eff446f047d89705091803bf3e8b" target="_blank" rel="noopener">"Cute Girl"</a> by tcube (Sketchfab)
                </div>
            </div>

            <div class="credit-item">
                <div class="credit-label">Asset Pipeline</div>
                <div class="credit-val">
                    Optimized via <a href="https://gltf-transform.dev/" target="_blank" rel="noopener">glTF-Transform</a><br>
                    <span style="font-size: 0.75rem; color: var(--text-muted);">Meshopt Compression </span>
                </div>
            </div>

            <div class="credit-item">
                <div class="credit-label">Environment (HDR)</div>
                <div class="credit-val">
                    Sourced from <a href="https://polyhaven.com/" target="_blank" rel="noopener">Poly Haven</a>
                </div>
            </div>
        </div>
    </div>

    <!-- Preset Controls -->
    <div class="controls" id="controls">
        <button class="preset-btn active" data-preset="0">Cinematic</button>
        <button class="preset-btn" data-preset="1">Studio</button>
        <button class="preset-btn" data-preset="2">Daylight</button>
    </div>

    <!-- Interaction Hint -->
    <div class="hint" id="hint">Drag to orbit &middot; Scroll to zoom</div>

    <script type="module">
        import init, { switch_preset } from './pkg/showcase.js';

        async function run() {
            try {
                await init();
                console.log('[Myth] WASM initialized');
            } catch (e) {
                console.error('[Myth] Init failed:', e);
                const label = document.querySelector('.loader-label');
                if (label) {
                    label.textContent = 'WebGPU is required';
                    label.style.color = '#f7768e';
                }
                document.querySelector('.loader-ring')?.remove();
                return;
            }

            // Reveal UI after loading overlay fades out
            const observer = new MutationObserver(() => {
                const overlay = document.getElementById('loading-overlay');
                if (overlay && overlay.classList.contains('fade-out')) {
                    document.getElementById('top-bar')?.classList.add('visible');
                    document.getElementById('controls')?.classList.add('visible');
                    document.getElementById('hint')?.classList.add('visible');
                    observer.disconnect();
                    // Auto-hide hint after a few seconds
                    setTimeout(() => {
                        const hint = document.getElementById('hint');
                        if (hint) hint.style.opacity = '0';
                    }, 8000);
                }
            });
            observer.observe(document.getElementById('loading-overlay'), {
                attributes: true, attributeFilter: ['class']
            });

            // Preset button bindings
            const buttons = document.querySelectorAll('.preset-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    switch_preset(parseInt(btn.dataset.preset, 10));
                });
            });


            // --- Info Modal Logic ---
            const infoBtn = document.getElementById('info-btn');
            const closeBtn = document.getElementById('close-credits');
            const modal = document.getElementById('credits-modal');

            infoBtn.addEventListener('click', () => {
                modal.classList.add('active');
            });

            closeBtn.addEventListener('click', () => {
                modal.classList.remove('active');
            });

            modal.addEventListener('click', (e) => {
                if (e.target === modal) {
                    modal.classList.remove('active');
                }
            });
        }

        run();
    </script>

    
</body>
</html>
