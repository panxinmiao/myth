[[bin]]
name = "gltf_shower"
path = "main.rs"

[dependencies]
myth = { workspace = true, features = ["gltf-meshopt"] }
myth_dev_utils = { workspace = true }

log = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
web-sys = { workspace = true, features = ["Window", "Document", "Element", "DomTokenList", "Location", "UrlSearchParams"] }

[lints]
workspace = true