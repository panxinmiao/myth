[package]
name = "gltf_shower"
description = "Lightweight standalone glTF showcase viewer for Myth Engine."
version.workspace = true
rust-version.workspace = true
edition.workspace = true
authors.workspace = true
license.workspace = true
repository.workspace = true
homepage.workspace = true
publish = false

[package.metadata.gallery]
name = "glTF Showcase"
category = "glTF Showcase"
description = "High-quality glTF 2.0 sample models from Khronos Group."
order = 10

[[package.metadata.gallery.showcase]]
id = "damaged-helmet"
name = "Damaged Helmet"
model = "https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/DamagedHelmet/glTF-Binary/DamagedHelmet.glb"

