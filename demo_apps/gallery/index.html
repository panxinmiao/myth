<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Myth Engine — Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css">
</head>
<body data-page="gallery">
    <!-- Full-bleed canvas: iframe occupies 100% viewport -->
    <iframe id="viewer-frame" class="viewer-frame" title="Myth Gallery Viewer" src="about:blank"></iframe>

    <!-- Sidebar toggle (visible when sidebar is closed) -->
    <button class="sidebar-toggle" id="sidebar-toggle" type="button" aria-label="打开导航">
        <svg width="16" height="12" viewBox="0 0 16 12" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M0 1h16M0 6h10M0 11h16" stroke="currentColor" stroke-width="1.4"/>
        </svg>
    </button>

    <!-- Scrim overlay for mobile sidebar -->
    <div class="sidebar-scrim" id="sidebar-scrim" hidden></div>

    <!-- Floating glassmorphism sidebar -->
    <aside class="sidebar" id="sidebar">
        <header class="sidebar-header">
            <div>
                <div class="logo">MYTH<span class="logo-accent">ENGINE</span></div>
                <div class="version">v0.2.0</div>
            </div>
            <button class="sidebar-close" id="sidebar-close" type="button" aria-label="关闭导航">&times;</button>
        </header>

        <div class="sidebar-divider"></div>

        <nav id="nav-menu" class="nav-menu" aria-label="Gallery navigation"></nav>

        <div class="sidebar-divider"></div>

        <footer class="sidebar-footer">
            <a class="footer-link" href="https://github.com/panxinmiao/myth" target="_blank" rel="noreferrer">GitHub</a>
        </footer>
    </aside>

    <!-- Native-only placeholder -->
    <div class="native-overlay hidden" id="native-overlay">
        <div class="native-card">
            <div class="native-badge">NATIVE ONLY</div>
            <h2 id="native-title">—</h2>
            <p id="native-copy">该示例仅支持原生运行，不提供网页运行时。</p>
        </div>
    </div>

    <script type="module" src="./main.js"></script>
</body>
</html>
